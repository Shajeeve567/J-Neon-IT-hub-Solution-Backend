spring.application.name=IT hub for a client
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway settings
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=false


# Supabase Setting
supabase.storage.endpoint=${SUPABASE_ENDPOINT}
supabase.storage.region=${SUPABASE_REGION}
supabase.storage.accessKey=${SUPABASE_ACCESS_KEY}
supabase.storage.secretKey=${SUPABASE_SECRET_KEY}
supabase.storage.bucket=${SUPABASE_BUCKET}
supabase.projectUrl=${SUPABASE_PROJECT_URL}